apiVersion: v1
kind: Service
metadata:
  name: dtensor-mesh-test
  namespace: default
  labels:
    app: dtensor-mesh-test
spec:
  clusterIP: None
  selector:
    app: dtensor-mesh-test
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dtensor-mesh-test
  namespace: default
  labels:
    app: dtensor-mesh-test
    kueue.x-k8s.io/queue-name: default-queue
spec:
  parallelism: 2
  completions: 2
  completionMode: Indexed
  backoffLimit: 0
  suspend: true
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: dtensor-mesh-test
    spec:
      restartPolicy: Never
      subdomain: dtensor-mesh-test
      nodeSelector:
        role: gpu-worker
        accelerator: gpu-t4
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
        - key: ray.io/node-type
          operator: Equal
          value: worker
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: dtensor-mesh-test
              topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: pytorch/pytorch:2.5.1-cuda12.1-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
          env:
            - name: WORLD_SIZE
              value: "2"
            - name: RANK
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: MASTER_ADDR
              value: dtensor-mesh-test-0.dtensor-mesh-test.default.svc.cluster.local
            - name: MASTER_PORT
              value: "29500"
            - name: TORCH_DISTRIBUTED_DEBUG
              value: DETAIL
            - name: NCCL_DEBUG
              value: INFO
          command:
            - /bin/bash
            - -lc
            - |
              set -euxo pipefail
              python -m pip install --no-cache-dir --upgrade pip
              python -m pip install --no-cache-dir "einops==0.8.0" "rich==13.9.4"

              if [ "${RANK}" != "0" ]; then
                sleep 8
              fi

              python - <<'PY'
              import datetime
              import os

              import torch
              import torch.distributed as dist
              from torch.distributed.device_mesh import init_device_mesh
              from torch.distributed.tensor import Shard, distribute_tensor

              rank = int(os.environ["RANK"])
              world_size = int(os.environ["WORLD_SIZE"])
              master_addr = os.environ["MASTER_ADDR"]
              master_port = os.environ["MASTER_PORT"]

              has_cuda = torch.cuda.is_available()
              backend = "nccl" if has_cuda else "gloo"
              device_type = "cuda" if has_cuda else "cpu"
              if has_cuda:
                  torch.cuda.set_device(0)
                  device = torch.device("cuda:0")
              else:
                  device = torch.device("cpu")

              dist.init_process_group(
                  backend=backend,
                  init_method=f"tcp://{master_addr}:{master_port}",
                  rank=rank,
                  world_size=world_size,
                  timeout=datetime.timedelta(minutes=5),
              )

              mesh = init_device_mesh(device_type, (world_size,))

              if rank == 0:
                  base = torch.arange(world_size * 8, device=device).reshape(world_size, 8)
              else:
                  base = torch.empty((world_size, 8), device=device)
              dist.broadcast(base, src=0)

              dt = distribute_tensor(base, mesh, placements=[Shard(0)])
              local = dt.to_local()
              print(f"[rank={rank}] local shard shape={tuple(local.shape)} values={local.tolist()}")

              x = torch.tensor([float(rank + 1)], device=device)
              dist.all_reduce(x, op=dist.ReduceOp.SUM)
              print(f"[rank={rank}] all_reduce sum={x.item()} (expected 3.0)")
              assert abs(x.item() - 3.0) < 1e-6

              dist.barrier()
              dist.destroy_process_group()
              print(f"[rank={rank}] distributed smoke test passed")
              PY
